name: DigiNews CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================
  # JOB 1: Run Unit Tests
  # ============================================================
  test:
    name: 🧪 Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify code generation (Isar .g.dart already committed)
        run: |
          dart run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      - name: Run Unit Tests
        run: flutter test --no-pub

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
        continue-on-error: true

  # ============================================================
  # JOB 2: Build APK Release (DEV Flavor)
  # ============================================================
  build-dev:
    name: 🏗️ Build APK DEV Flavor
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK DEV Release
        run: |
          flutter build apk \
            --release \
            --flavor dev \
            --dart-define=FLAVOR=dev \
            -t lib/main.dart

      - name: Upload DEV APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: diginews-dev-release-apk
          path: build/app/outputs/flutter-apk/app-dev-release.apk
          retention-days: 30

  # ============================================================
  # JOB 3: Build APK Release (PROD Flavor)
  # ============================================================
  build-prod:
    name: 🚀 Build APK PROD Flavor
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK PROD Release
        run: |
          flutter build apk \
            --release \
            --flavor prod \
            --dart-define=FLAVOR=prod \
            -t lib/main.dart

      - name: Upload PROD APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: diginews-prod-release-apk
          path: build/app/outputs/flutter-apk/app-prod-release.apk
          retention-days: 30
